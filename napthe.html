<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng Thanh Toán Nạp Thẻ</title>
    <style>
        /* Trang trí giao diện */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .card {
            background-color: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h2 { color: #2563eb; margin-top: 0; font-size: 24px; }
        .qr-box {
            border: 2px dashed #3b82f6;
            border-radius: 12px;
            padding: 15px;
            background-color: #eff6ff;
            margin: 20px 0;
        }
        .qr-box img {
            max-width: 100%;
            border-radius: 8px;
        }
        .info-text { font-size: 16px; margin: 10px 0; }
        .highlight { font-weight: bold; color: #dc2626; font-size: 18px; }
        .footer { font-size: 13px; color: #6b7280; margin-top: 20px; }
        .error { color: #dc2626; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Thanh Toán Nạp Thẻ</h2>
        
        <div id="error-msg" class="error">
            Không tìm thấy thông tin giao dịch. Vui lòng tạo lại mã trong game!
        </div>

        <div id="payment-content">
            <p class="info-text">Sử dụng App Ngân Hàng để quét mã</p>
            
            <div class="qr-box">
                <img id="qr-image" src="" alt="Đang tải mã QR...">
            </div>

            <p class="info-text">Số tiền: <span id="amount-text" class="highlight">0</span> VNĐ</p>
            <p class="info-text">Nội dung: <span id="info-text" class="highlight">...</span></p>
            
            <p class="footer">
                Hệ thống sẽ tự động cộng Xu vào game sau 1-2 phút.<br>
                <b>Lưu ý:</b> Không sửa nội dung chuyển khoản!
            </p>
        </div>
    </div>

    <script>
        // 1. Cấu hình ngân hàng của bạn (Giống trong config.yml)
        const BANK_ID = "MB"; // Mã ngân hàng (VD: MB, VCB, Momo)
        const ACCOUNT_NO = "0968781641"; // Số tài khoản của bạn

        // 2. Lấy dữ liệu từ đường dẫn URL (ví dụ: ?amount=50000&addInfo=NAPCUCAI)
        const urlParams = new URLSearchParams(window.location.search);
        const amount = urlParams.get('amount');
        const addInfo = urlParams.get('addInfo');

        // 3. Kiểm tra dữ liệu và hiển thị mã QR
        if (amount && addInfo) {
            // Hiển thị số tiền và nội dung bằng chữ
            document.getElementById('amount-text').innerText = parseInt(amount).toLocaleString('vi-VN');
            document.getElementById('info-text').innerText = addInfo;

            // Tạo link ảnh VietQR
            const qrApiUrl = `https://img.vietqr.io/image/${BANK_ID}-${ACCOUNT_NO}-compact.png?amount=${amount}&addInfo=${addInfo}`;
            
            // Gắn ảnh vào giao diện
            document.getElementById('qr-image').src = qrApiUrl;
        } else {
            // Nếu ai đó tự ý truy cập web mà không qua link trong game
            document.getElementById('payment-content').style.display = 'none';
            document.getElementById('error-msg').style.display = 'block';
        }
    </script>
</body>
</html>
